<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B132B" />
      <stop offset="100%" stop-color="#1C2541" />
    </linearGradient>
    <linearGradient id="trophy-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-grad)" />
  <rect width="800" height="600" fill="url(#grid)" />

  <!-- Code Editor Window -->
  <g transform="translate(160, 110)">
    <!-- Base Shadow & Frame -->
    <rect x="-10" y="-10" width="380" height="240" rx="10" fill="#000000" opacity="0.3" />
    <rect x="0" y="0" width="360" height="220" rx="8" fill="#1F2937" stroke="#374151" stroke-width="4" />
    <!-- Editor Header -->
    <path d="M 0 8 L 360 8 L 360 30 L 0 30 Z" fill="#111827" />
    <!-- Window Controls -->
    <circle cx="20" cy="19" r="6" fill="#EF4444" />
    <circle cx="40" cy="19" r="6" fill="#F59E0B" />
    <circle cx="60" cy="19" r="6" fill="#10B981" />
    
    <!-- Code Lines -->
    <g transform="translate(25, 55)">
      <!-- Line 1 -->
      <rect x="0" y="0" width="80" height="8" rx="4" fill="#00B4D8" />
      <rect x="90" y="0" width="120" height="8" rx="4" fill="#F59E0B" />
      <!-- Line 2 -->
      <rect x="20" y="18" width="140" height="8" rx="4" fill="#10B981" />
      <rect x="170" y="18" width="60" height="8" rx="4" fill="#EF4444" />
      <!-- Line 3 -->
      <rect x="40" y="36" width="180" height="8" rx="4" fill="#FFFFFF" opacity="0.9" />
      <!-- Line 4 -->
      <rect x="40" y="54" width="80" height="8" rx="4" fill="#00B4D8" />
      <rect x="130" y="54" width="110" height="8" rx="4" fill="#F59E0B" />
      <!-- Line 5 -->
      <rect x="20" y="72" width="50" height="8" rx="4" fill="#FFFFFF" opacity="0.5" />
      <!-- Line 6 -->
      <rect x="0" y="90" width="90" height="8" rx="4" fill="#00B4D8" />
    </g>
  </g>

  <!-- Glowing Trophy (Overlap side) -->
  <g transform="translate(520, 190)">
    <!-- Base Glow -->
    <circle cx="0" cy="0" r="70" fill="#F59E0B" opacity="0.15" filter="blur(15px)" />
    
    <!-- Trophy Cup -->
    <path d="M -40 -50 L 40 -50 C 40 -10 25 15 0 20 C -25 15 -40 -10 -40 -50 Z" fill="url(#trophy-grad)" />
    <!-- Handles -->
    <path d="M -40 -35 C -65 -35 -55 -10 -40 -5 M 40 -35 C 65 -35 55 -10 40 -5" fill="none" stroke="url(#trophy-grad)" stroke-width="6" stroke-linecap="round"/>
    <!-- Stem & Base -->
    <rect x="-8" y="20" width="16" height="30" fill="url(#trophy-grad)" />
    <path d="M -30 50 L 30 50 L 20 65 L -20 65 Z" fill="#D97706" />
    <!-- Star on Trophy -->
    <path d="M 0 -22 L 3 -13 L 12 -13 L 5 -8 L 8 1 L 0 -4 L -8 1 L -5 -8 L -12 -13 L -3 -13 Z" fill="#FFFFFF" />
  </g>

  <!-- Typography -->
  <text x="400" y="450" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" letter-spacing="1">HACKATHONS &amp; COMPETITIONS</text>
  <text x="400" y="490" text-anchor="middle" font-family="'Inter', sans-serif" font-size="16" fill="#00B4D8" font-weight="500">Problem Solving &amp; Innovation</text>
  <text x="400" y="525" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#9CA3AF" opacity="0.8">PMEC Student Branch Chapter</text>
</svg>

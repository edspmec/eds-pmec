<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B132B" />
      <stop offset="100%" stop-color="#1C2541" />
    </linearGradient>
    <linearGradient id="screen-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00629B" />
      <stop offset="100%" stop-color="#003554" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-grad)" />
  <rect width="800" height="600" fill="url(#grid)" />

  <!-- Presentation Screen Representation -->
  <g transform="translate(180, 100)">
    <!-- Main Screen Shadow & Frame -->
    <rect x="-10" y="-10" width="460" height="260" rx="10" fill="#000000" opacity="0.4" />
    <rect x="0" y="0" width="440" height="240" rx="8" fill="#111827" stroke="#374151" stroke-width="6" />
    <!-- Screen Content Area -->
    <rect x="10" y="10" width="420" height="220" rx="4" fill="url(#screen-grad)" />
    
    <!-- Design details on screen (Chart/Data) -->
    <!-- Grid on screen -->
    <path d="M 40 180 L 120 120 L 200 150 L 280 80 L 380 140" fill="none" stroke="#00B4D8" stroke-width="4" stroke-linecap="round" />
    <path d="M 40 180 L 120 120 L 200 150 L 280 80 L 380 140 L 380 200 L 40 200 Z" fill="rgba(0, 180, 216, 0.15)" />
    <!-- Glowing nodes on chart -->
    <circle cx="40" cy="180" r="6" fill="#FFFFFF" />
    <circle cx="120" cy="120" r="6" fill="#FFFFFF" />
    <circle cx="200" cy="150" r="6" fill="#FFFFFF" />
    <circle cx="280" cy="80" r="6" fill="#FFFFFF" />
    <circle cx="380" cy="140" r="6" fill="#FFFFFF" />

    <!-- Speaker Silhouette (Small) -->
    <path d="M 50 220 C 50 180 80 180 90 180 C 100 180 130 180 130 220 Z" fill="#1F2937" />
    <circle cx="90" cy="165" r="15" fill="#1F2937" />
  </g>

  <!-- Microphone / Lecture Stand Silhouette -->
  <g transform="translate(140, 270)">
    <rect x="0" y="0" width="25" height="100" fill="#374151" rx="2" />
    <path d="M -10 0 L 35 0 L 25 -10 L 0 -10 Z" fill="#111827" />
    <path d="M 12 0 L 12 -40" stroke="#9CA3AF" stroke-width="4" />
    <circle cx="12" cy="-42" r="6" fill="#374151" />
  </g>

  <!-- Typography -->
  <text x="400" y="450" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" letter-spacing="1">EXPERT GUEST LECTURES</text>
  <text x="400" y="490" text-anchor="middle" font-family="'Inter', sans-serif" font-size="16" fill="#00B4D8" font-weight="500">Seminars on Emerging Technologies</text>
  <text x="400" y="525" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#9CA3AF" opacity="0.8">PMEC Student Branch Chapter</text>
</svg>

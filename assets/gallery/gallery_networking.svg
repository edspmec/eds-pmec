<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B132B" />
      <stop offset="100%" stop-color="#1C2541" />
    </linearGradient>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B4D8" />
      <stop offset="100%" stop-color="#00629B" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-grad)" />
  <rect width="800" height="600" fill="url(#grid)" />

  <!-- Networking Web Constellation -->
  <g transform="translate(400, 220)">
    <!-- Connections (Lines) -->
    <line x1="-120" y1="-80" x2="0" y2="-120" stroke="#00B4D8" stroke-width="2" opacity="0.6" />
    <line x1="0" y1="-120" x2="120" y2="-80" stroke="#00B4D8" stroke-width="2" opacity="0.6" />
    <line x1="120" y1="-80" x2="150" y2="40" stroke="#00B4D8" stroke-width="2" opacity="0.6" />
    <line x1="150" y1="40" x2="40" y2="100" stroke="#00B4D8" stroke-width="2" opacity="0.6" />
    <line x1="40" y1="100" x2="-80" y2="90" stroke="#00B4D8" stroke-width="2" opacity="0.6" />
    <line x1="-80" y1="90" x2="-150" y2="20" stroke="#00B4D8" stroke-width="2" opacity="0.6" />
    <line x1="-150" y1="20" x2="-120" y2="-80" stroke="#00B4D8" stroke-width="2" opacity="0.6" />
    
    <!-- Cross connections -->
    <line x1="-120" y1="-80" x2="40" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <line x1="0" y1="-120" x2="-80" y2="90" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <line x1="120" y1="-80" x2="-150" y2="20" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    <line x1="0" y1="-120" x2="40" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" />
    
    <!-- Central Node -->
    <circle cx="0" cy="0" r="45" fill="url(#node-grad)" />
    <!-- Connected Handshake Icon (simplified) inside central node -->
    <path d="M-15 5 L-5 -5 L5 5 L15 -5" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
    <path d="M-10 10 C-5 15, 5 15, 10 10" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
    
    <!-- External Nodes -->
    <circle cx="-120" cy="-80" r="16" fill="#00B4D8" />
    <circle cx="0" cy="-120" r="20" fill="#00629B" />
    <circle cx="120" cy="-80" r="16" fill="#00B4D8" />
    <circle cx="150" cy="40" r="18" fill="#00629B" />
    <circle cx="40" cy="100" r="14" fill="#00B4D8" />
    <circle cx="-80" cy="90" r="18" fill="#00629B" />
    <circle cx="-150" cy="20" r="14" fill="#00B4D8" />

    <!-- Node Icons (Simple Dots / Lights) -->
    <circle cx="-120" cy="-80" r="6" fill="#FFFFFF" />
    <circle cx="0" cy="-120" r="8" fill="#FFFFFF" />
    <circle cx="120" cy="-80" r="6" fill="#FFFFFF" />
    <circle cx="150" cy="40" r="7" fill="#FFFFFF" />
    <circle cx="40" cy="100" r="5" fill="#FFFFFF" />
    <circle cx="-80" cy="90" r="7" fill="#FFFFFF" />
    <circle cx="-150" cy="20" r="5" fill="#FFFFFF" />
  </g>

  <!-- Typography -->
  <text x="400" y="450" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" letter-spacing="1">NETWORKING &amp; COLLABORATION</text>
  <text x="400" y="490" text-anchor="middle" font-family="'Inter', sans-serif" font-size="16" fill="#00B4D8" font-weight="500">IEEE Members &amp; Industry Connect</text>
  <text x="400" y="525" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#9CA3AF" opacity="0.8">PMEC Student Branch Chapter</text>
</svg>

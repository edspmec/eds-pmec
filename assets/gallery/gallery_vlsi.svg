<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B132B" />
      <stop offset="100%" stop-color="#1C2541" />
    </linearGradient>
    <linearGradient id="chip-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00629B" />
      <stop offset="100%" stop-color="#00B4D8" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-grad)" />
  <rect width="800" height="600" fill="url(#grid)" />

  <!-- Decorative Circuit Traces -->
  <path d="M 100 100 L 250 100 L 300 150 L 300 250" fill="none" stroke="rgba(0, 180, 216, 0.2)" stroke-width="3" />
  <circle cx="100" cy="100" r="5" fill="#00B4D8" opacity="0.6"/>
  <circle cx="300" cy="250" r="5" fill="#00B4D8" opacity="0.6"/>

  <path d="M 700 500 L 550 500 L 500 450 L 500 350" fill="none" stroke="rgba(0, 98, 155, 0.3)" stroke-width="3" />
  <circle cx="700" cy="500" r="5" fill="#00629B" opacity="0.6"/>
  <circle cx="500" cy="350" r="5" fill="#00629B" opacity="0.6"/>

  <!-- Centered Chip/IC Vector -->
  <g transform="translate(400, 260)">
    <!-- Outer Board Shadow/Glow -->
    <rect x="-110" y="-110" width="220" height="220" rx="20" fill="none" stroke="#00B4D8" stroke-width="2" opacity="0.4" filter="blur(4px)" />
    <!-- Outer Board -->
    <rect x="-100" y="-100" width="200" height="200" rx="15" fill="#1F2937" stroke="#374151" stroke-width="4" />
    
    <!-- Chip Pins -->
    <!-- Top Pins -->
    <path d="M-60 -100 L-60 -115 M-30 -100 L-30 -115 M0 -100 L0 -115 M30 -100 L30 -115 M60 -100 L60 -115" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round" />
    <!-- Bottom Pins -->
    <path d="M-60 100 L-60 115 M-30 100 L-30 115 M0 100 L0 115 M30 100 L30 115 M60 100 L60 115" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round" />
    <!-- Left Pins -->
    <path d="M-100 -60 L-115 -60 M-100 -30 L-115 -30 M-100 0 L-115 0 M-100 30 L-115 30 M-100 60 L-115 60" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round" />
    <!-- Right Pins -->
    <path d="M100 -60 L115 -60 M100 -30 L115 -30 M100 0 L115 0 M100 30 L115 30 M100 60 L115 60" stroke="#9CA3AF" stroke-width="6" stroke-linecap="round" />

    <!-- Main Silicon Chip -->
    <rect x="-60" y="-60" width="120" height="120" rx="10" fill="url(#chip-grad)" />
    
    <!-- Core Details -->
    <rect x="-30" y="-30" width="60" height="60" rx="5" fill="#0B132B" opacity="0.8" />
    <circle cx="0" cy="0" r="15" fill="#00B4D8" opacity="0.3" />
    <circle cx="0" cy="0" r="5" fill="#FFFFFF" />
  </g>

  <!-- Typography -->
  <text x="400" y="450" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" letter-spacing="1">VLSI &amp; CHIP DESIGN</text>
  <text x="400" y="490" text-anchor="middle" font-family="'Inter', sans-serif" font-size="16" fill="#00B4D8" font-weight="500">IEEE EDS Technical Workshop</text>
  <text x="400" y="525" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#9CA3AF" opacity="0.8">PMEC Student Branch Chapter</text>
</svg>

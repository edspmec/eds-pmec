<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B132B" />
      <stop offset="100%" stop-color="#1C2541" />
    </linearGradient>
    <linearGradient id="screen-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg-grad)" />
  <rect width="800" height="600" fill="url(#grid)" />

  <!-- Oscilloscope Display -->
  <g transform="translate(200, 110)">
    <!-- Chassis Shadow & Body -->
    <rect x="-10" y="-10" width="420" height="240" rx="12" fill="#000000" opacity="0.3" />
    <rect x="0" y="0" width="400" height="220" rx="8" fill="#374151" stroke="#4B5563" stroke-width="5" />
    
    <!-- Screen Area -->
    <rect x="15" y="15" width="270" height="190" fill="url(#screen-grad)" stroke="#111827" stroke-width="3" />
    
    <!-- Oscilloscope Grid Lines -->
    <path d="M 15 110 L 285 110 M 150 15 L 150 205" stroke="rgba(0, 180, 216, 0.2)" stroke-dasharray="4,4" stroke-width="1" />
    
    <!-- Sine Wave -->
    <path d="M 15 110 C 50 10, 80 10, 115 110 C 150 210, 180 210, 215 110 C 250 10, 270 10, 285 110" fill="none" stroke="#10B981" stroke-width="4" stroke-linecap="round" filter="drop-shadow(0 0 4px #10B981)" />
    
    <!-- Control Knobs (Right Side) -->
    <g transform="translate(340, 50)">
      <circle cx="0" cy="0" r="16" fill="#1F2937" stroke="#9CA3AF" stroke-width="2" />
      <line x1="0" y1="0" x2="10" y2="-10" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
    </g>
    <g transform="translate(340, 110)">
      <circle cx="0" cy="0" r="16" fill="#1F2937" stroke="#9CA3AF" stroke-width="2" />
      <line x1="0" y1="0" x2="-12" y2="0" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" />
    </g>
    <!-- Jacks -->
    <circle cx="315" cy="175" r="8" fill="#111827" stroke="#9CA3AF" stroke-width="2" />
    <circle cx="315" cy="175" r="4" fill="#000000" />
    <circle cx="365" cy="175" r="8" fill="#111827" stroke="#9CA3AF" stroke-width="2" />
    <circle cx="365" cy="175" r="4" fill="#000000" />
  </g>

  <!-- Typography -->
  <text x="400" y="450" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" letter-spacing="1">HANDS-ON LAB PROJECTS</text>
  <text x="400" y="490" text-anchor="middle" font-family="'Inter', sans-serif" font-size="16" fill="#00B4D8" font-weight="500">Hardware &amp; Circuit Prototyping</text>
  <text x="400" y="525" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="#9CA3AF" opacity="0.8">PMEC Student Branch Chapter</text>
</svg>
